<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>La Grande Partenza</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Inter, sans-serif;
    background:
        linear-gradient(rgba(0,0,0,.45), rgba(0,0,0,.78)),
        url('herrenreise.jpg') center/cover fixed;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    text-align: center;
}

.wrap {
    max-width: 1100px;
    width: 100%;
    padding: 24px 18px;
}

h1 {
    font-family: Cinzel, serif;
    font-size: clamp(2.5rem, 8vw, 6rem);
    margin: 0;
    line-height: .95;
    text-shadow: 0 8px 28px rgba(0,0,0,.8);
}

.sub {
    font-size: clamp(1rem, 3vw, 1.5rem);
    margin: 12px 0 32px;
    color: #f2dfb0;
}

.timer {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
}

.n {
    background: linear-gradient(#1b1b1b, #050505);
    border-radius: 18px;
    padding: 20px 10px;
    font-size: clamp(3rem, 8vw, 5rem);
    font-weight: 900;
    border: 1px solid rgba(255,255,255,.22);
    box-shadow: 0 14px 34px rgba(0,0,0,.65);
    font-variant-numeric: tabular-nums;
}

.l {
    margin-top: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-size: .8rem;
    color: #f2dfb0;
}

.train {
    font-size: 2.8rem;
    margin: 24px 0 8px;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    50% { transform: scale(1.08); }
}

.status {
    margin-top: 8px;
    font-family: Cinzel, serif;
    color: #d9b05a;
    font-size: clamp(1.1rem, 3vw, 1.45rem);
    min-height: 2rem;
}

.crew {
    margin: 32px auto 0;
    max-width: 760px;
    padding: 22px 18px;
    border-radius: 24px;
    background: rgba(0,0,0,.48);
    border: 1px solid rgba(255,255,255,.18);
    box-shadow: 0 18px 42px rgba(0,0,0,.45);
    backdrop-filter: blur(8px);
}

.crew h2 {
    font-family: Cinzel, serif;
    margin: 0 0 6px;
    color: #f2dfb0;
    letter-spacing: 2px;
}

.crew .crew-sub {
    color: #d9b05a;
    margin-bottom: 18px;
    letter-spacing: 1px;
}

.passengers {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
}

.passenger {
    padding: 9px 13px;
    border-radius: 999px;
    background: rgba(255,255,255,.10);
    border: 1px solid rgba(255,255,255,.16);
}

.passenger.pending {
    border-color: rgba(217,176,90,.8);
    color: #f2dfb0;
}

@media(max-width:700px) {
    .timer { grid-template-columns: repeat(2, 1fr); }
    .crew { margin-top: 24px; }
}
</style>
</head>

<body>
<div class="wrap">
    <h1>LA GRANDE PARTENZA</h1>
    <div class="sub">Bologna • 17 Luglio 2026 • Ore 11:00</div>

    <div class="timer">
        <div><div id="d" class="n">00</div><div class="l">Tage</div></div>
        <div><div id="h" class="n">00</div><div class="l">Stunden</div></div>
        <div><div id="m" class="n">00</div><div class="l">Minuten</div></div>
        <div><div id="s" class="n">00</div><div class="l">Sekunden</div></div>
    </div>

    <div class="train">🚄</div>
    <div class="status" id="status">Operazione Birra 🍺</div>

    <section class="crew">
        <h2>👥 La Squadra</h2>
        <div class="crew-sub">🇮🇹 Equipaggio del Treno</div>

        <div class="passengers">
            <div class="passenger">🚄 Friedolin</div>
            <div class="passenger">🚄 Wolfi</div>
            <div class="passenger">🚄 Michi</div>
            <div class="passenger">🚄 Vatergans</div>
            <div class="passenger">🚄 Pirmin</div>
            <div class="passenger">🚄 Klausi</div>
            <div class="passenger pending">❓ Flexman?</div>
        </div>
    </section>
</div>

<script>
const target = new Date("2026-07-17T11:00:00+02:00").getTime();

const phrases = [
    "Operazione Birra 🍺",
    "Missione Aperol 🍹",
    "Dolce Vita Tour 2026 🇮🇹",
    "La Squadra è Pronta 💪",
    "Vacanza Leggendaria ☀️",
    "Bologna wartet 🍝",
    "Andiamo ragazzi 🇮🇹"
];

function set(id, value) {
    document.getElementById(id).textContent = String(value).padStart(2, "0");
}

function tick() {
    const diff = target - Date.now();

    if (diff <= 0) {
        document.body.innerHTML =
            "<h1 style='font-family:Cinzel,serif;color:white;text-align:center'>SI PARTE! 🍻🇮🇹</h1>";
        return;
    }

    set("d", Math.floor(diff / 86400000));
    set("h", Math.floor(diff / 3600000) % 24);
    set("m", Math.floor(diff / 60000) % 60);
    set("s", Math.floor(diff / 1000) % 60);
}

tick();
setInterval(tick, 1000);

setInterval(() => {
    document.getElementById("status").textContent =
        phrases[Math.floor(Math.random() * phrases.length)];
}, 5000);
</script>
</body>
</html>
